# Base URL where the signed whitelist bundle is published.
# The handler downloads:
#   ${WHITELIST_BASE_URL}/apps.tar
#   ${WHITELIST_BASE_URL}/apps.tar.asc
WHITELIST_BASE_URL="https://phramusca.github.io/apt-thirdparty"

# Optional explicit URLs (leave empty to use WHITELIST_BASE_URL defaults).
# WHITELIST_ARCHIVE_URL=""
# WHITELIST_SIG_URL=""

# Refresh interval in seconds (default: 86400 = 24h).
WHITELIST_REFRESH_INTERVAL_SEC=86400
